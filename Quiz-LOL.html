<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/Heart.jpeg">
    <title>Quiz LoL - Descubra sua Região e seu Campeão</title>
    <style>
    
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1428 0%, #1a2e52 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
            min-height: 600px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 2.5rem;
            color: #4c63d2;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .question-container {
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 30px;
        }

        .question-container.active {
            opacity: 1;
            transform: translateX(0);
        }

        .question-container.exit {
            opacity: 0;
            transform: translateX(-100px);
            position: absolute; /* Prevent layout shift during transition */
        }

        .question {
            font-size: 1.4rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
            text-align: center;
            line-height: 1.6;
        }

        .answers {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }

        .answer {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
            border: 2px solid #e0e7ff;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            color: #4c63d2;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .answer:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(76, 99, 210, 0.2);
            border-color: #4c63d2;
        }

        .answer::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .answer:hover::before {
            left: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e7ff;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4c63d2, #667eea);
            border-radius: 10px;
            transition: width 0.6s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-counter {
            text-align: center;
            color: #666;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .loading-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 500px;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid #e0e7ff;
            border-top: 8px solid #4c63d2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.3rem;
            color: #4c63d2;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .loading-progress {
            width: 300px;
            height: 10px;
            background: #e0e7ff;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .loading-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4c63d2, #667eea);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .result-screen {
            display: none;
            text-align: center;
            animation: fadeInScale 0.8s ease;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* New style for the champion image */
        .champion-image {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            margin: 0 auto 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 3px solid white;
        }

        .result-title {
            font-size: 2.2rem;
            color: #4c63d2;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .region-name {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .champion-name {
            font-size: 2rem;
            color: #667eea;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .characteristics {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: left;
        }

        .characteristics h3 {
            color: #4c63d2;
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .characteristics p {
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, #4c63d2 0%, #667eea 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 99, 210, 0.3);
        }

        .start-screen {
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .start-btn {
            background: linear-gradient(135deg, #4c63d2 0%, #667eea 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(76, 99, 210, 0.3);
        }

        .intro-text {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">League of Legends</h1>
            <p class="subtitle">Descubra sua Região e Campeão</p>
        </div>

        <div id="startScreen" class="start-screen">
            <p class="intro-text">
                Responda 10 perguntas e descubra qual região de Runeterra combina com sua personalidade
                e qual campeão você seria!
            </p>
            <button class="start-btn" onclick="startQuiz()">Começar Quiz</button>
        </div>

        <div id="quizScreen" style="display: none;">
            <div class="question-counter">
                <span id="currentQuestion">1</span> de 10
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 10%"></div>
            </div>
            <div id="questionContainer" class="question-container active">
                <div class="question" id="questionText"></div>
                <div class="answers" id="answersContainer"></div>
            </div>
        </div>

        <div id="loadingScreen" class="loading-screen">
            <div class="loading-spinner"></div>
            <div class="loading-text">Analisando suas respostas...</div>
            <div class="loading-progress">
                <div class="loading-progress-fill" id="loadingProgressFill"></div>
            </div>
            <div id="loadingPercentage">0%</div>
        </div>

        <div id="resultScreen" class="result-screen">
            <h2 class="result-title">Seu Resultado!</h2>
            <!-- Champion image will be displayed here -->
            <img id="championImage" src="" alt="Imagem do Campeão" class="champion-image" onerror="this.onerror=null;this.src='https://placehold.co/800x473/667eea/ffffff?text=Campeão';">
            <div class="region-name" id="regionName"></div>
            <div class="champion-name" id="championName"></div>
            <div class="characteristics">
                <h3>Características da Região</h3>
                <p id="regionDescription"></p>
                <h3>Características do seu Campeão</h3>
                <p id="championDescription"></p>
            </div>
            <button class="restart-btn" onclick="restartQuiz()">Fazer Quiz Novamente</button>
        </div>
    </div>

                champions: [
                    { name: "Leona", description: "O Amanhecer Radiante - Uma guerreira escolhida pelo sol que protege os inocentes com luz divina. Representa proteção, fé inabalável e poder solar.", image: "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Leona_0.jpg" },
                    { name: "Diana", description: "O Escárnio da Lua - Uma herege que abraçou o poder lunar e luta contra a ortodoxia solar. Simboliza rebelião, mistério lunar e busca pela verdade.", image: "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Diana_0.jpg" },
                    { name: "Pantheon", description: "A Lança Indestrutível - Um mortal que desafiou os deuses e luta com determinação humana. Representa perseverança, coragem mortal e resistência contra o destino.", image: "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Pantheon_0.jpg" }
                ]
            }
        };

        let currentQuestionIndex = 0;
        let scores = {
            demacia: 0,
            noxus: 0,
            ionia: 0,
            freljord: 0,
            piltover: 0,
            bilgewater: 0,
            shurima: 0,
            targon: 0
        };

        function startQuiz() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestionIndex];
            const questionContainer = document.getElementById('questionContainer');
            
            questionContainer.classList.remove('active');
            questionContainer.classList.add('exit');
            
            setTimeout(() => {
                document.getElementById('questionText').textContent = question.question;
                document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
                
                const answersContainer = document.getElementById('answersContainer');
                answersContainer.innerHTML = '';
                
                question.answers.forEach((answer) => {
                    const answerDiv = document.createElement('div');
                    answerDiv.className = 'answer';
                    answerDiv.textContent = answer.text;
                    answerDiv.onclick = () => selectAnswer(answer);
                    answersContainer.appendChild(answerDiv);
                });
                
                const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
                document.getElementById('progressFill').style.width = progress + '%';
                
                questionContainer.classList.remove('exit');
                questionContainer.classList.add('active');
            }, 300);
        }

        function selectAnswer(answer) {
            for (let region in answer.regions) {
                if (scores.hasOwnProperty(region)) {
                    scores[region] += answer.regions[region];
                }
            }
            
            currentQuestionIndex++;
            
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showLoading();
            }
        }

        function showLoading() {
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'flex';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress > 100) progress = 100;
                
                document.getElementById('loadingProgressFill').style.width = progress + '%';
                document.getElementById('loadingPercentage').textContent = Math.floor(progress) + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(showResult, 500);
                }
            }, 100);
        }

        function showResult() {
            let topRegion = '';
            let highestScore = -1;
            
            for (let region in scores) {
                if (scores.hasOwnProperty(region) && scores[region] > highestScore) {
                    highestScore = scores[region];
                    topRegion = region;
                }
            }
            
            const regionData = regions[topRegion];
            const randomChampion = regionData.champions[Math.floor(Math.random() * regionData.champions.length)];
            
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            document.getElementById('championImage').src = randomChampion.image;
            document.getElementById('regionName').textContent = regionData.name;
            document.getElementById('championName').textContent = randomChampion.name;
            document.getElementById('regionDescription').textContent = regionData.description;
            document.getElementById('championDescription').textContent = randomChampion.description;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            scores = { demacia: 0, noxus: 0, ionia: 0, freljord: 0, piltover: 0, bilgewater: 0, shurima: 0, targon: 0 };
            
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
            
            // Reset progress bar
            document.getElementById('progressFill').style.width = '10%';
        }
    </script>
</body>
</html>
